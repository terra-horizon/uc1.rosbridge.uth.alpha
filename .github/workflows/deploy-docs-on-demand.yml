name: Deploy Docs On-Demand

on:
  workflow_dispatch: 

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy-docs:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build Documentation
        run: |
          mkdir -p docs_output
          if [ -d "docs" ]; then
            echo "Found a docs folder, copying contents..."
            cp -r docs/* docs_output/
          else
            echo "<h1>ROS1 & ROS2 Bridge Workspace Documentation</h1>" > docs_output/index.html
            echo "<p>Generated dynamically on-demand via GitHub Actions.</p>" >> docs_output/index.html
            echo "<p>Triggered by user: <strong>${{ github.actor }}</strong></p>" >> docs_output/index.html
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './docs_output'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
